	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


	<style>

		body {
			margin: 0;
			padding-top: 50px; /* Adjust this value based on the height of your nav bar */
		}

		body {
			margin: 0;
			padding-top: 50px; /* Adjust this value based on the height of your nav bar */
		}

		.navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #000000;
            padding: 10px 20px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
		}

        .nav-center {
			position: absolute;
            left: 50%;
            transform: translateX(-70%);
		}

		@media (max-width: 768px) {
			.nav-center {
				transform: translateX(-75%);
			}}
    

        .hamburger {
            font-size: 22px;
            color: white;
            cursor: pointer;
		}

        .side-menu { 
		    position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background: black;
            padding-top: 80px;
            transition: 0.3s ease;
            z-index: 1001;
		}

        .side-menu a {
            display: block;
            padding: 15px 25px;
            color: white;
            text-decoration: none;
		}

        .side-menu a:hover {
            background: #111;
		}


		.side-menu.active {
			left: 0;
			position: fixed;
		}

		.close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 22px;
            color: white;
            cursor: pointer;
		}
		
		nav ul {
			display:flex; /*puts content side by side*/
			align-items: center; /*Used alongside display: flex to align properly*/
			list-style: none; /*used to remove list bullet points*/
			gap: 2em;
		}

		nav a {
			text-decoration: rgb(0, 0, 0); 
			color: rgb(255, 255, 255);
			font-weight: 300;
		} /*Used to  design text in the anchor*/

		nav a:hover{
			text-decoration: underline;
		} /*used to design what happens when cusor hovers over text*/

		.logo-link {
			display: flex;
            align-items: center;
		}

		.logo-img {
            height: 50px;
            width: auto;
		}

		.logo{
			text-align: center;
		}

		h1 {
			margin-top: 50px;  /* Add some space above the heading */
			text-align: center;
			padding: 3em; /*defines space between contents in an element*/
		}

		.logo-align {
			text-align: center;
		}

		.brand-section-container {
			margin-top: 1em;
			margin-bottom: 1em; /*puts space between the top and bottom of the page*/
			width: 100%; /*lets width stretch to the max screen of device*/
			display:grid;
			grid-template-columns: repeat(3, 1fr); /*defines grid items arrangement*/
		} /*puts items in grid*/

		@media (max-width: 768px) {
			.brand-section-container {
				grid-template-columns: repeat(2, 1fr);
				}}

		.brand-section{
            transition: transform 0.2s ease;
            }

        .brand-section:hover{
            transform: translateY(-5px);
            }

		.brand-logo {
			width: min(250px, 100%); /*used to ensure minimum image and that image is never larger than the screen being displayed on*/
			height: 250px;
			padding: 15px;
		}

		.brand-logo:hover {
			opacity: 70%;
		}

		@media (max-width: 768px) {
			.brand-logo {
				width: min(150px, 100%);
				height: 150px;
				}}

	    .search-container{
			position: relative;
			margin-left: auto; /* Pushes the search container to the right */
			margin-right: 50px; /* Adds some space between the search container and the right edge */
			margin-top: 13px;
		}

		.search-input{
			width: 0;
			padding: 0;
			border: none;
			outline: none;
			transition: width 0.4s ease, padding 0.4s ease;
			font-size: 17px;
		}

		.search-input:focus {
			width: 200px;
			padding: 5px;
			border-radius: 5px;
		}

		@media (max-width: 768px) {
            .search-input:focus {
            position: fixed;
			border-radius: 0;
            top: 0;
            left: 0;
            width: 100%;
			height: 35px;
            padding: 15px;
            background: white;
			z-index: 1001; /* Ensure the search input appears above other elements */
			}}

		.search-btn {
			cursor: pointer;
			color: #ffffff;
		}

		.site-footer{
            text-align:center;
            padding:20px;
            background:rgb(255, 255, 255);
            color:rgb(0, 0, 0);
            font-size:14px;
            }

	</style>

		<script>

        function searchFunction() {
			let input = document.getElementById("searchInput");
            let filter = input.value.toLowerCase();
            let products = document.getElementsByClassName("products");
			
			for (let i = 0; i < products.length; i++) {
				let text = products[i].textContent.toLowerCase();
				if (text.includes(filter)) {
					products[i].style.display = "";
					} else {
						products[i].style.display = "none";
						}
						}
						}

        </script>

		<script>
        function toggleMenu() {
            document.getElementById("sideMenu").classList.add("active");
		}
        function closeMenu() {
            document.getElementById("sideMenu").classList.remove("active");
			}
        </script>
