    <style>

		body {
			margin: 0;
		}
		
		nav ul {
			display:flex; /*puts content side by side*/
			align-items: center; /*Used alongside display: flex to align properly*/
			list-style: none; /*used to remove list bullet points*/
			gap: 2em;
		}

		nav a {
			text-decoration: rgb(0, 0, 0); 
			color: black;
			font-weight: 300;
		} /*Used to  design text in the anchor*/

		nav a:hover{
			text-decoration: underline;
		} /*used to design what happens when cusor hovers over text*/

		.products {
            display:grid;
            grid-template-columns: repeat(4, 1fr); /*defines grid items arrangement*/
			margin-top: 1em;
			margin-bottom: 1em; /*puts space between the top and bottom of the page*/
			width: 100%; /*lets width stretch to the max screen of device*/
            gap: 40px;
		} /*puts items in grid*/
		@media (max-width: 768px) {
			.products {
				grid-template-columns: repeat(2, 1fr);
				}}

        .product{
            text-align: center;
        }

		.clothe-text {
			margin-top: 100px;
			font-size: medium;
		}

		.clothe-image {
			width: min(300px, 100%); /*used to ensure minimum image and that image is never larger than the screen being displayed on*/
			border-radius: 20px;
            height: 250px;
            object-fit: contain;
		}

		.buy-button {
			display: inline-block;
			text-decoration:dotted; color: rgb(0, 0, 0);
			border-radius: 10px;
			width:fit-content;
			cursor: pointer;
			align-content: center;
		}

        .buy-button:hover{
            text-decoration: underline;
        }

		.header-section {
			position: relative;
			text-align: center;
			padding: 0;
			margin: 0;
			box-sizing: border-box;
			overflow: hidden;
		}

		.header-img {
			width:100vw;
			height: 300px;
			margin: 0;
			padding: 0;
			background-size: cover;
		}

		.header-text {
			position: absolute;
			color: rgb(255, 255, 255);
			top: 0;
			left: 52%;
			transform: translate(-50%, -50%);
			margin-top: 50px;  /* Add some space above the heading */
			text-align: center;
		}

		@media (max-width: 768px) {
			.header-text {
				font-size: small;
				top: 0;
			    left: 53%;
			    transform: translate(-50%, -50%);
			}}


    </style>
